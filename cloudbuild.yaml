steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'docker.io/josephks10/sit737-capstone-api:$SHORT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "$$DOCKERHUB_PASS" | docker login -u josephks10 --password-stdin
        docker push docker.io/josephks10/sit737-capstone-api:$SHORT_SHA
    secretEnv: ['DOCKERHUB_PASS']

  - name: 'gcr.io/cloud-builders/kubectl'
    args:
      - 'set'
      - 'image'
      - 'deployment/sit737-api'
      - 'sit737-api=docker.io/josephks10/sit737-capstone-api:$SHORT_SHA'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=australia-southeast1'
      - 'CLOUDSDK_CONTAINER_CLUSTER=sit737-cluster'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/dockerhub-pass/versions/latest
      env: 'DOCKERHUB_PASS'

options:
  logging: CLOUD_LOGGING_ONLY